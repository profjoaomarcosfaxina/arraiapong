<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arraia Caipira</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #150a24;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Press Start 2P', cursive;
}
#gameContainer {
  position: relative;
  border: 8px solid #8b4513;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8);
}
canvas { display: block; background: #0d0221; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>
<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  const paddleW = 28;
  const paddleH = 110;
  const player = { x: 30, y: H/2 - paddleH/2, score: 0 };
  const ai = { x: W - 30 - paddleW, y: H/2 - paddleH/2, score: 0 };
  const ball = { x: W/2, y: H/2, r: 14, speed: 6, vx: 0, vy: 0 };

  let state = 'start';
  let winner = '';
  let flash = 0;
  let time = 0;

  const keys = {};
  const stars = [];
  const clouds = [];
  const balloons = [];
  const bubbles = [];
  const sparks = [];
  const fireworks = [];

  function init() {
    createStars();
    createClouds();
    createBalloons();
    createBubbles();
    resetBall();
  }

  function createStars() {
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H * 0.65,
        r: 0.5 + Math.random() * 1.5,
        tw: Math.random() * Math.PI * 2
      });
    }
  }

  function createClouds() {
    for (let i = 0; i < 5; i++) {
      clouds.push({
        x: Math.random() * W,
        y: 20 + Math.random() * 160,
        w: 70 + Math.random() * 90,
        speed: 0.08 + Math.random() * 0.15
      });
    }
  }

  function createBalloons() {
    const colors = ['#ff5252', '#69f0ae', '#ffeb3b', '#e040fb', '#40c4ff'];
    for (let i = 0; i < 7; i++) {
      balloons.push({
        x: Math.random() * W,
        y: 60 + Math.random() * 220,
        r: 12 + Math.random() * 10,
        color: colors[i % colors.length],
        sway: Math.random() * Math.PI * 2,
        speed: 0.2 + Math.random() * 0.3
      });
    }
  }

  function createBubbles() {
    for (let i = 0; i < 35; i++) {
      bubbles.push({
        x: Math.random() * W,
        y: H - 40 + Math.random() * 40,
        r: 2 + Math.random() * 7,
        speed: 0.2 + Math.random() * 0.6,
        alpha: 0.1 + Math.random() * 0.2
      });
    }
  }

  function resetBall() {
    ball.x = W/2;
    ball.y = H/2;
    ball.speed = 6;
    const dir = Math.random() > 0.5 ? 1 : -1;
    const angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
    ball.vx = dir * ball.speed * Math.cos(angle);
    ball.vy = ball.speed * Math.sin(angle);
  }

  function resetGame() {
    player.score = 0;
    ai.score = 0;
    player.y = H/2 - paddleH/2;
    ai.y = H/2 - paddleH/2;
    fireworks.length = 0;
    state = 'play';
    resetBall();
  }

  function rectCollide(b, p) {
    return b.x - b.r < p.x + paddleW &&
           b.x + b.r > p.x &&
           b.y > p.y &&
           b.y < p.y + paddleH;
  }

  function update() {
    time += 0.05;

    for (let c of clouds) {
      c.x += c.speed;
      if (c.x > W + 60) c.x = -60;
    }
    for (let b of balloons) {
      b.y -= b.speed;
      b.x += Math.sin(time * 0.5 + b.sway) * 0.4;
      if (b.y < -40) {
        b.y = H + 40;
        b.x = Math.random() * W;
      }
    }
    for (let b of bubbles) {
      b.y -= b.speed;
      if (b.y < -10) {
        b.y = H + 10;
        b.x = Math.random() * W;
      }
    }
    if (flash > 0) flash -= 0.04;

    if (state === 'play') {
      if (keys['ArrowUp'] || keys['KeyW']) player.y -= 7;
      if (keys['ArrowDown'] || keys['KeyS']) player.y += 7;
      player.y = Math.max(0, Math.min(H - paddleH, player.y));

      const aiCenter = ai.y + paddleH/2;
      const diff = ball.y - aiCenter;
      if (Math.abs(diff) > 6) {
        ai.y += Math.sign(diff) * Math.min(Math.abs(diff) * 0.13, 5.5);
      }
      ai.y = Math.max(0, Math.min(H - paddleH, ai.y));

      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.y - ball.r < 0) {
        ball.y = ball.r;
        ball.vy *= -1;
      }
      if (ball.y + ball.r > H) {
        ball.y = H - ball.r;
        ball.vy *= -1;
      }

      if (ball.vx < 0 && rectCollide(ball, player)) {
        ball.x = player.x + paddleW + ball.r;
        let angle = (ball.y - (player.y + paddleH/2)) / (paddleH/2);
        angle = Math.max(-0.85, Math.min(0.85, angle));
        ball.speed = Math.min(ball.speed + 0.2, 12);
        ball.vx = ball.speed * Math.cos(angle);
        ball.vy = ball.speed * Math.sin(angle);
      }
      if (ball.vx > 0 && rectCollide(ball, ai)) {
        ball.x = ai.x - ball.r;
        let angle = (ball.y - (ai.y + paddleH/2)) / (paddleH/2);
        angle = Math.max(-0.85, Math.min(0.85, angle));
        ball.speed = Math.min(ball.speed + 0.2, 12);
        ball.vx = -ball.speed * Math.cos(angle);
        ball.vy = ball.speed * Math.sin(angle);
      }

      if (ball.x - ball.r < 0) {
        ai.score++;
        flash = 1;
        if (ai.score >= 5) { state = 'over'; winner = 'IA'; }
        else resetBall();
      }
      if (ball.x + ball.r > W) {
        player.score++;
        flash = 1;
        if (player.score >= 5) { state = 'over'; winner = 'JOGADOR'; }
        else resetBall();
      }
    }

    if (Math.random() < 0.25) {
      sparks.push({
        x: W - 100 + (Math.random() - 0.5) * 40,
        y: H - 40,
        vx: (Math.random() - 0.5) * 1.5,
        vy: -1.5 - Math.random() * 2,
        life: 1
      });
    }
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.x += s.vx;
      s.y += s.vy;
      s.life -= 0.02;
      if (s.life <= 0) sparks.splice(i, 1);
    }

    if (state === 'over') {
      if (Math.random() < 0.04) createFirework();
      for (let i = fireworks.length - 1; i >= 0; i--) {
        const p = fireworks[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.life -= 0.015;
        if (p.life <= 0) fireworks.splice(i, 1);
      }
    }
  }

  function createFirework() {
    const colors = ['#ffeb3b', '#ff5722', '#4caf50', '#2196f3', '#e91e63', '#ffffff'];
    const color = colors[Math.floor(Math.random() * colors.length)];
    const x = Math.random() * W;
    const y = H/2 - 80 - Math.random() * 120;
    for (let i = 0; i < 35; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      fireworks.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        color
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawBalloons();
    drawBubbles();
    drawFlags();
    drawCampfire();
    drawPaddle(player, 'player');
    drawPaddle(ai, 'ai');
    drawCandyApple(ball.x, ball.y, ball.r);
    drawScore();
    drawFlash();
    if (state === 'start') drawStart();
    if (state === 'over') drawEnd();
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0b0221');
    grad.addColorStop(0.55, '#1a0f2e');
    grad.addColorStop(1, '#0f3a3a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    for (let s of stars) {
      ctx.globalAlpha = 0.3 + 0.7 * Math.abs(Math.sin(time * 2 + s.tw));
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#f6f1d5';
    ctx.shadowColor = '#f6f1d5';
    ctx.shadowBlur = 25;
    ctx.beginPath();
    ctx.arc(90, 70, 38, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
    for (let c of clouds) drawCloud(c.x, c.y, c.w);

    ctx.fillStyle = '#163b16';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.quadraticCurveTo(180, H - 130, 380, H - 50);
    ctx.lineTo(W, H);
    ctx.fill();

    ctx.fillStyle = '#0d280d';
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.quadraticCurveTo(320, H - 190, 620, H - 90);
    ctx.lineTo(W, H);
    ctx.fill();

    ctx.fillStyle = '#1a4a66';
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let x = 0; x <= W; x += 20) {
      ctx.lineTo(x, H - 25 - 6 * Math.sin(x * 0.02 + time));
    }
    ctx.lineTo(W, H);
    ctx.fill();
  }

  function drawCloud(x, y, w) {
    ctx.beginPath();
    ctx.arc(x, y, w * 0.25, 0, Math.PI * 2);
    ctx.arc(x + w * 0.3, y - w * 0.1, w * 0.35, 0, Math.PI * 2);
    ctx.arc(x + w * 0.6, y, w * 0.28, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawBalloons() {
    for (let b of balloons) {
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + b.r);
      ctx.lineTo(b.x, b.y + b.r + 18);
      ctx.stroke();
      const grad = ctx.createRadialGradient(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.2, b.x, b.y, b.r);
      grad.addColorStop(0, lighten(b.color, 40));
      grad.addColorStop(1, b.color);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.beginPath();
      ctx.ellipse(b.x - b.r*0.3, b.y - b.r*0.3, b.r*0.25, b.r*0.12, Math.PI/4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function lighten(hex, amt) {
    let n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) + amt;
    let g = ((n >> 8) & 0x00FF) + amt;
    let b = (n & 0x0000FF) + amt;
    r = Math.min(255, Math.max(0, r));
    g = Math.min(255, Math.max(0, g));
    b = Math.min(255, Math.max(0, b));
    return `rgb(${r},${g},${b})`;
  }

  function drawBubbles() {
    for (let b of bubbles) {
      ctx.fillStyle = `rgba(255, 255, 255, ${b.alpha})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawFlags() {
    drawFlagString(0, 45, W, 32);
    drawFlagString(0, H/2, W, 18);
  }

  function drawFlagString(startX, y, totalW, flagH) {
    ctx.strokeStyle = '#6d3b16';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(startX, y);
    ctx.lineTo(totalW, y);
    ctx.stroke();

    const spacing = 48;
    const colors = ['#e63946', '#f1faee', '#a8dadc', '#457b9d', '#ffbe0b', '#2a9d8f'];
    let i = 0;
    for (let x = startX; x < totalW - spacing; x += spacing) {
      ctx.fillStyle = colors[i % colors.length];
      ctx.beginPath();
      ctx.moveTo(x + 2, y);
      ctx.lineTo(x + flagH/2, y + flagH);
      ctx.lineTo(x + flagH - 2, y);
      ctx.fill();
      i++;
    }
  }

  function drawCampfire() {
    const cx = W - 95, cy = H - 25;
    ctx.fillStyle = '#5c3a1e';
    ctx.beginPath();
    ctx.ellipse(cx - 22, cy + 8, 38, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 12, cy + 13, 38, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < 4; i++) {
      const h = 45 + 18 * Math.sin(time * 6 + i * 2.1);
      const fx = cx + (i - 1.5) * 12;
      const grad = ctx.createRadialGradient(fx, cy - 25, 3, fx, cy - 25, h);
      grad.addColorStop(0, 'rgba(255, 255, 100, 0.95)');
      grad.addColorStop(0.5, 'rgba(255, 100, 0, 0.75)');
      grad.addColorStop(1, 'rgba(255, 0, 0, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(fx - 14, cy);
      ctx.quadraticCurveTo(fx + Math.sin(time * 4 + i) * 6, cy - h, fx + 14, cy);
      ctx.fill();
    }

    ctx.fillStyle = '#ffd54f';
    for (let s of sparks) {
      ctx.globalAlpha = s.life;
      ctx.beginPath();
      ctx.arc(s.x, s.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function roundRect(x, y, w, h, r) {
    const rr = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x + rr, y);
    ctx.lineTo(x + w - rr, y);
    ctx.arcTo(x + w, y, x + w, y + rr, rr);
    ctx.lineTo(x + w, y + h - rr);
    ctx.arcTo(x + w, y + h, x + w - rr, y + h, rr);
    ctx.lineTo(x + rr, y + h);
    ctx.arcTo(x, y + h, x, y + h - rr, rr);
    ctx.lineTo(x, y + rr);
    ctx.arcTo(x, y, x + rr, y, rr);
    ctx.closePath();
  }

  function drawPaddle(p, type) {
    const x = p.x, y = p.y;
    ctx.fillStyle = '#4a8a2a';
    ctx.beginPath();
    ctx.moveTo(x + 2, y + paddleH - 8);
    ctx.quadraticCurveTo(x - 12, y + paddleH + 22, x + 6, y + paddleH + 28);
    ctx.quadraticCurveTo(x + 8, y + paddleH + 12, x + paddleW - 2, y + paddleH - 5);
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(x + paddleW - 2, y + paddleH - 8);
    ctx.quadraticCurveTo(x + paddleW + 12, y + paddleH + 22, x + paddleW - 6, y + paddleH + 28);
    ctx.quadraticCurveTo(x + paddleW - 8, y + paddleH + 12, x + 2, y + paddleH - 5);
    ctx.fill();

    const cobGrad = ctx.createLinearGradient(x, y, x + paddleW, y);
    cobGrad.addColorStop(0, '#e6b800');
    cobGrad.addColorStop(0.5, '#f5d142');
    cobGrad.addColorStop(1, '#c79400');
    ctx.fillStyle = cobGrad;
    roundRect(x, y, paddleW, paddleH, 8);
    ctx.fill();

    ctx.save();
    ctx.beginPath();
    roundRect(x, y, paddleW, paddleH, 8);
    ctx.clip();
    const kw = 7, kh = 5;
    for (let row = 0; row < Math.floor(paddleH / kh); row++) {
      const offsetX = (row % 2) * 3;
      for (let col = 0; col < 3; col++) {
        const kx = x + 4 + col * (kw + 1) + offsetX;
        const ky = y + 4 + row * kh;
        if (kx + kw/2 > x + paddleW - 2) continue;
        ctx.fillStyle = (row + col) % 2 === 0 ? '#f5c542' : '#d4a017';
        ctx.beginPath();
        ctx.ellipse(kx, ky, kw/2, kh/2, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.restore();

    if (type === 'player') drawStrawHat(x + paddleW/2, y - 2);
    else drawFlowerCrown(x + paddleW/2, y - 2);
  }

  function drawStrawHat(cx, cy) {
    ctx.fillStyle = '#e6c875';
    ctx.beginPath();
    ctx.ellipse(cx, cy, 22, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c9a85c';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = '#deb968';
    ctx.beginPath();
    ctx.moveTo(cx - 9, cy);
    ctx.lineTo(cx - 5, cy - 20);
    ctx.lineTo(cx + 5, cy - 20);
    ctx.lineTo(cx + 9, cy);
    ctx.fill();
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 6, cy - 5);
    ctx.lineTo(cx + 6, cy - 5);
    ctx.stroke();
  }

  function drawFlowerCrown(cx, cy) {
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath();
    ctx.arc(cx, cy, 13, 0, Math.PI * 2);
    ctx.fill();
    const flowers = [
      { dx: 0, dy: -7, c: '#ff5252' },
      { dx: -8, dy: -2, c: '#ffeb3b' },
      { dx: 8, dy: -2, c: '#ab47bc' },
      { dx: -4, dy: 5, c: '#ffffff' },
      { dx: 4, dy: 5, c: '#66bb6a' }
    ];
    for (let f of flowers) {
      ctx.fillStyle = f.c;
      ctx.beginPath();
      ctx.arc(cx + f.dx, cy + f.dy, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(cx + f.dx - 1, cy + f.dy - 1, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawCandyApple(x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.strokeStyle = '#d2a679';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.75);
    ctx.lineTo(2, -r * 1.45);
    ctx.stroke();

    const grad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
    grad.addColorStop(0, '#ff6b6b');
    grad.addColorStop(0.5, '#cc0000');
    grad.addColorStop(1, '#800000');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.9);
    ctx.bezierCurveTo(r * 0.85, -r * 0.9, r, -r * 0.2, r, r * 0.3);
    ctx.bezierCurveTo(r, r * 0.95, r * 0.4, r * 0.95, 0, r * 0.7);
    ctx.bezierCurveTo(-r * 0.4, r * 0.95, -r, r * 0.95, -r, r * 0.3);
    ctx.bezierCurveTo(-r, -r * 0.2, -r * 0.85, -r * 0.9, 0, -r * 0.9);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.55)';
    ctx.beginPath();
    ctx.ellipse(-r * 0.35, -r * 0.25, r * 0.28, r * 0.16, Math.PI / 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
    ctx.beginPath();
    ctx.ellipse(r * 0.25, r * 0.35, r * 0.12, r * 0.08, -Math.PI/6, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawScore() {
    ctx.font = '22px "Press Start 2P"';
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#000';
    ctx.shadowBlur = 4;
    ctx.fillText(`${player.score}   |   ${ai.score}`, W/2, 38);
    ctx.shadowBlur = 0;
  }

  function drawFlash() {
    if (flash > 0) {
      ctx.fillStyle = `rgba(255, 255, 255, ${flash})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawStart() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
    ctx.fillRect(0, 0, W, H);

    ctx.font = '70px "Luckiest Guy"';
    ctx.fillStyle = '#ffeb3b';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff5722';
    ctx.shadowBlur = 20;
    ctx.fillText('ARRAIA CAIPIRA', W/2, H/2 - 50);
    ctx.shadowBlur = 0;

    ctx.font = '14px "Press Start 2P"';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('PRESSIONE ENTER PARA COMEÇAR', W/2, H/2 + 30);
    ctx.fillText('▲ ▼ SETAS PARA MOVER', W/2, H/2 + 65);
  }

  function drawEnd() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
    ctx.fillRect(0, 0, W, H);

    ctx.font = '55px "Luckiest Guy"';
    ctx.fillStyle = '#ff4081';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ffeb3b';
    ctx.shadowBlur = 22;
    ctx.fillText('FIM DE ARRAIAL', W/2, H/2 - 60);
    ctx.shadowBlur = 0;

    ctx.font = '18px "Press Start 2P"';
    ctx.fillStyle = '#ffffff';
    ctx.fillText(`${winner} VENCEU!`, W/2, H/2);

    ctx.font = '12px "Press Start 2P"';
    ctx.fillStyle = '#ffeb3b';
    ctx.fillText('PRESSIONE ENTER PARA REINICIAR', W/2, H/2 + 45);

    for (let p of fireworks) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (state === 'start' && (e.code === 'Enter' || e.code === 'Space')) {
      state = 'play';
      if (ball.vx === 0 && ball.vy === 0) resetBall();
    }
    if (state === 'over' && e.code === 'Enter') {
      resetGame();
    }
    if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
  });

  window.addEventListener('keyup', e => {
    keys[e.code] = false;
  });

  init();
  requestAnimationFrame(loop);

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
